<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunt: Showdown DB</title>
<link rel="stylesheet" href="css/style.css">
<!-- ⚠️ css/style.css 는 아직 없습니다. 디자인은 데이터 다 채운 뒤 별도로 작업할 예정입니다. -->
</head>
<body>

  <header id="app-header">
    <h1>Hunt: Showdown DB</h1>
    <nav id="main-nav">
      <button class="nav-btn" data-tab="search" type="button">DB 검색</button>
      <button class="nav-btn" data-tab="loadout" type="button">로드아웃 빌더</button>
      <button class="nav-btn" data-tab="analysis" type="button">분석</button>
    </nav>
  </header>

  <main id="app-main">

    <!-- ===================== 1. DB 검색 탭 ===================== -->
    <section id="tab-search" class="tab-panel">

      <div id="search-controls">
        <input type="text" id="search-input" placeholder="이름으로 검색...">

        <div id="category-filters">
          <button class="cat-filter-btn active" data-category="all" type="button">전체</button>
          <button class="cat-filter-btn" data-category="weapon" type="button">무기</button>
          <button class="cat-filter-btn" data-category="tool" type="button">도구</button>
          <button class="cat-filter-btn" data-category="consumable" type="button">소모품</button>
          <button class="cat-filter-btn" data-category="trait" type="button">특성</button>
        </div>

        <div id="tag-filters">
          <!-- 태그 필터 칩들이 JS로 여기에 렌더링됩니다 -->
        </div>
      </div>

      <div id="search-body">
        <div id="item-grid">
          <!-- 검색 결과 카드들이 JS로 여기에 렌더링됩니다 -->
        </div>

        <aside id="item-detail-panel" hidden>
          <!-- 아이템 클릭 시 상세 정보가 JS로 여기에 렌더링됩니다 -->
        </aside>
      </div>
    </section>

    <!-- ===================== 2. 로드아웃 빌더 탭 ===================== -->
    <section id="tab-loadout" class="tab-panel" hidden>

      <div id="loadout-board">

        <div class="loadout-group" data-group="weapons">
          <h2>무기</h2>
          <div class="slot" data-slot-type="primary" data-slot-index="0">
            <span class="slot-label">주무기</span>
            <div class="slot-content">비어있음</div>
          </div>
          <div class="slot" data-slot-type="secondary" data-slot-index="0">
            <span class="slot-label">보조무기</span>
            <div class="slot-content">비어있음</div>
          </div>
        </div>

        <div class="loadout-group" data-group="tools">
          <h2>도구</h2>
          <div class="slot" data-slot-type="tool" data-slot-index="0">
            <span class="slot-label">도구 1</span>
            <div class="slot-content">비어있음</div>
          </div>
          <div class="slot" data-slot-type="tool" data-slot-index="1">
            <span class="slot-label">도구 2</span>
            <div class="slot-content">비어있음</div>
          </div>
        </div>

        <div class="loadout-group" data-group="consumables">
          <h2>소모품</h2>
          <div class="slot" data-slot-type="consumable" data-slot-index="0">
            <span class="slot-label">소모품 1</span>
            <div class="slot-content">비어있음</div>
          </div>
          <div class="slot" data-slot-type="consumable" data-slot-index="1">
            <span class="slot-label">소모품 2</span>
            <div class="slot-content">비어있음</div>
          </div>
          <div class="slot" data-slot-type="consumable" data-slot-index="2">
            <span class="slot-label">소모품 3</span>
            <div class="slot-content">비어있음</div>
          </div>
          <div class="slot" data-slot-type="consumable" data-slot-index="3">
            <span class="slot-label">소모품 4</span>
            <div class="slot-content">비어있음</div>
          </div>
        </div>

        <div class="loadout-group" data-group="traits">
          <h2>특성</h2>
          <div id="trait-slot-list">
            <!-- 추가된 특성들이 JS로 여기에 렌더링됩니다 -->
          </div>
          <button id="add-trait-btn" type="button">+ 특성 추가</button>
        </div>

      </div>

      <div id="loadout-actions">
        <button id="clear-loadout-btn" type="button">로드아웃 초기화</button>
        <button id="goto-analysis-btn" type="button">이 로드아웃으로 분석하기</button>
      </div>
    </section>

    <!-- ===================== 3. 분석 탭 ===================== -->
    <section id="tab-analysis" class="tab-panel" hidden>
      <div id="analysis-summary">
        <!-- 현재 로드아웃 구성 요약이 JS로 여기에 렌더링됩니다 -->
      </div>
      <div id="analysis-result">
        <!-- 태그별 강점/약점 바 차트 + 설명이 JS로 여기에 렌더링됩니다 -->
      </div>
    </section>

  </main>

  <!-- ===================== 아이템 선택 모달 ===================== -->
  <div id="modal-overlay" hidden>
    <div id="modal-box">
      <header id="modal-header">
        <h3 id="modal-title">아이템 선택</h3>
        <button id="modal-close-btn" type="button">닫기</button>
      </header>
      <input type="text" id="modal-search-input" placeholder="이름으로 검색...">
      <div id="modal-item-list">
        <!-- 선택 가능한 아이템 목록이 JS로 여기에 렌더링됩니다 -->
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
