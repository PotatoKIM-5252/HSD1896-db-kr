<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hunt Showdown Database</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Hunt Showdown Database</h1>

<div id="searchArea">

<input
type="text"
id="searchInput"
placeholder="무기 이름, 별칭, 영문명, 메타데이터 검색">

<button id="searchButton">
검색
</button>

</div>

</header>

<nav id="mainMenu">

<button data-category="weapons">Weapons</button>

<button data-category="tools">Tools</button>

<button data-category="consumables">Consumables</button>

<button data-category="traits">Traits</button>

</nav>

<div id="container">

<aside id="filterPanel">

<h2>Filter</h2>

<div id="filters">

카테고리를 선택하세요.

</div>

</aside>

<main>

<section id="listPanel">

</section>

<section id="detailPanel">

<h2>선택된 데이터</h2>

<p>좌측에서 선택하세요.</p>

</section>

</main>

</div>

<script src="script.js"></script>

</body>

</html>
