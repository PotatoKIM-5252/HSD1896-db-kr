<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunt: Showdown DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="app-header">
    <a href="#" id="site-logo" aria-label="Hunt: Showdown 1896 DB">
      <img src="images/ui/logo_full.png" alt="Hunt: Showdown 1896">
    </a>
    <nav id="main-nav">
      <button class="nav-btn" data-tab="search" type="button">DB 검색</button>
      <button class="nav-btn" data-tab="loadout" type="button">로드아웃 빌더</button>
      <button class="nav-btn" data-tab="analysis" type="button">무기 비교</button>
    </nav>
  </header>

  <main id="app-main">

    <!-- ===================== 1. DB 검색 탭 ===================== -->
    <section id="tab-search" class="tab-panel">

      <div id="search-controls">
        <input type="text" id="search-input" placeholder="이름으로 검색...">

        <div id="category-filters"></div>

        <!-- 무기 전용 필터 (칸수/탄종/탄약효과) -->
        <div id="weapon-filters"></div>

        <!-- 도구 전용 필터 (분류/태그) -->
        <div id="tool-filters"></div>

        <!-- 소모품 전용 필터 (분류/태그) -->
        <div id="consumable-filters"></div>

        <!-- 특성 전용 필터 (분류/태그) -->
        <div id="trait-filters"></div>
      </div>

      <div id="search-body">
        <div id="item-grid"></div>
        <aside id="item-detail-panel" hidden></aside>
      </div>
    </section>

    <!-- ===================== 2. 로드아웃 빌더 탭 ===================== -->
    <section id="tab-loadout" class="tab-panel" hidden>
      <div id="loadout-layout">

        <!-- 왼쪽: 칸을 클릭하면 여기서 검색·필터로 아이템을 고름 (기존 팝업 모달을 인라인으로 전환) -->
        <div id="loadout-picker-panel">
          <div id="picker-empty-state">
            <p>오른쪽에서 칸을 클릭하면<br>여기서 검색하고 필터로 골라 담을 수 있습니다.</p>
          </div>
          <div id="picker-content" hidden>
            <header id="picker-header">
              <h3 id="picker-title">아이템 선택</h3>
              <button id="picker-close-btn" type="button">닫기</button>
            </header>
            <div id="picker-subtabs" hidden></div>
            <input type="text" id="picker-search-input" placeholder="이름으로 검색...">
            <div id="picker-weapon-filters" hidden></div>
            <div id="picker-tool-filters" hidden></div>
            <div id="picker-consumable-filters" hidden></div>
            <div id="picker-trait-filters" hidden></div>
            <div id="picker-item-list"></div>
          </div>
        </div>

        <!-- 오른쪽: 실제 게임 로드아웃 장비창 스타일의 장비 요약판 -->
        <div id="loadout-equipment-panel"></div>

      </div>
      <div id="loadout-actions">
        <button id="clear-loadout-btn" type="button">로드아웃 초기화</button>
        <button id="goto-analysis-btn" type="button">무기 비교 탭으로 이동</button>
      </div>
    </section>

    <!-- ===================== 3. 무기 비교 탭 ===================== -->
    <section id="tab-analysis" class="tab-panel" hidden>
      <div id="compare-header">
        <h2>거리별 데미지 비교</h2>
        <button id="clear-compare-btn" type="button">비교 목록 초기화</button>
      </div>
      <div id="compare-weapon-list"></div>
      <div id="compare-chart-wrap"></div>

      <div id="compare-stats-header">
        <h2>총기 스탯 비교</h2>
        <p class="muted-text">위 목록에서 총을 클릭해 선택하세요. 1개 선택 시 스탯표, 2개 이상 선택 시 상대 비교 그래프가 표시됩니다.</p>
      </div>
      <div id="compare-stats-wrap"></div>
    </section>

  </main>

  <!-- ===================== 부위별 데미지 자세히 보기 오버레이 ===================== -->
  <div id="bodypart-overlay" hidden>
    <div id="bodypart-content"></div>
  </div>
  <div id="bp-kill-tooltip" class="bp-kill-tooltip" hidden></div>
  <div id="site-toast" class="site-toast" hidden></div>
  <div id="stat-tooltip" class="stat-tooltip" hidden></div>

  <!-- Chart.js: 거리별 데미지 그래프용 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
